name: Codzienny raport wolnych miejsc

# UWAGA: brak `schedule` - sprawdzone empirycznie (2026-07-19), że zapytania
# do api-gateway.intercity.pl failują sieciowo ("TypeError: Failed to fetch")
# z adresów IP GitHub-hosted runnerów, niezależnie od obejścia headless
# Chromium (xvfb) i retry na Akamai 418 - wygląda na blokadę IP data center
# lub ograniczenie geograficzne, którego nie da się obejść z poziomu kodu.
# Codzienny check zostaje na macOS LaunchAgent. Ten workflow zostaje tylko
# do ręcznego uruchomienia (np. do testu z innego runnera/IP w przyszłości).
on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instaluj zależności
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Uruchom checker
        # xvfb-run daje Chromium prawdziwy (niewidoczny) wyświetlacz - headless
        # jest blokowany przez ochronę antybotową ebilet.intercity.pl.
        run: xvfb-run -a python3 intercity_checker.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
